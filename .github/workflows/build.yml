name: Build CandyPad Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Checkout userspace
        uses: actions/checkout@v4

      - name: Setup QMK with CandyPad fork
        run: |
          qmk setup -H /root/qmk_firmware -b sr-candykeys-candypad binepad-global/qmk_firmware -y

      - name: Copy userspace keymap
        run: |
          mkdir -p /root/qmk_firmware/keyboards/binepad/candypad/keymaps/my_keymap
          cp -r $GITHUB_WORKSPACE/keyboards/binepad/candypad/keymaps/my_keymap/* /root/qmk_firmware/keyboards/binepad/candypad/keymaps/my_keymap/

      - name: Compile firmware
        run: |
          cd /root/qmk_firmware
          qmk compile -kb binepad/candypad -km my_keymap

      - name: List build outputs
        run: |
          echo "=== Root firmware files ==="
          ls -la /root/qmk_firmware/*.bin /root/qmk_firmware/*.hex /root/qmk_firmware/*.uf2 2>/dev/null || true
          echo "=== .build directory ==="
          find /root/qmk_firmware/.build -type f \( -name "*.bin" -o -name "*.hex" -o -name "*.uf2" -o -name "*.elf" \) 2>/dev/null || true

      - name: Convert to bin if needed
        run: |
          cd /root/qmk_firmware
          mkdir -p /tmp/firmware_out
          # Copy any .bin from root
          cp *.bin /tmp/firmware_out/ 2>/dev/null || true
          # If no .bin found, convert from .elf
          if [ -z "$(ls /tmp/firmware_out/*.bin 2>/dev/null)" ]; then
            ELF=$(find .build -name "*.elf" | head -1)
            if [ -n "$ELF" ]; then
              arm-none-eabi-objcopy -O binary "$ELF" /tmp/firmware_out/candypad_firmware.bin
            fi
          fi
          # Also copy any .uf2 or .hex as fallback
          cp *.uf2 /tmp/firmware_out/ 2>/dev/null || true
          cp *.hex /tmp/firmware_out/ 2>/dev/null || true
          ls -la /tmp/firmware_out/

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: candypad-firmware
          path: /tmp/firmware_out/*
