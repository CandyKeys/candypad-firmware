name: Build CandyPad Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: qmkfm/qmk_cli

    steps:
      - name: Checkout userspace
        uses: actions/checkout@v4

      - name: Setup QMK
        run: |
          qmk setup -y
          ln -s $GITHUB_WORKSPACE/keyboards/ $HOME/qmk_firmware/keyboards/ 2>/dev/null || true

      - name: Compile firmware
        run: qmk compile -kb binepad/candypad -km my_keymap

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: candypad-firmware
          path: |
            /root/qmk_firmware/*.hex
            /root/qmk_firmware/*.bin
            /root/qmk_firmware/*.uf2
