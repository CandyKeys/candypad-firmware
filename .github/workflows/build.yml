name: Build CandyPad Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/qmk/qmk_cli

    steps:
      - name: Checkout userspace
        uses: actions/checkout@v4

      - name: Setup QMK with CandyPad fork
        run: |
          qmk setup -H /root/qmk_firmware -b sr-candykeys-candypad binepad-global/qmk_firmware -y

      - name: Copy userspace keymap
        run: |
          mkdir -p /root/qmk_firmware/keyboards/binepad/candypad/keymaps/my_keymap
          cp -r $GITHUB_WORKSPACE/keyboards/binepad/candypad/keymaps/my_keymap/* /root/qmk_firmware/keyboards/binepad/candypad/keymaps/my_keymap/

      - name: Compile firmware
        run: |
          cd /root/qmk_firmware
          qmk compile -kb binepad/candypad -km my_keymap

      - name: Convert to .hex
        run: |
          cd /root/qmk_firmware
          ELF_FILE=$(find .build -name "*.elf" | head -1)
          if [ -n "$ELF_FILE" ]; then
            arm-none-eabi-objcopy -O ihex "$ELF_FILE" binepad_candypad_my_keymap.hex
            echo "Converted $ELF_FILE to .hex"
          else
            echo "No .elf file found!" && exit 1
          fi

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: candypad-firmware
          path: /root/qmk_firmware/*.hex
